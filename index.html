<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>한수원 레트로 갤러그</title>
    <!-- 구글 폰트에서 레트로 오락실 폰트 불러오기 -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #fff;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none; /* 모바일에서 화면 스크롤 방지 */
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 600px; /* 모바일/PC 겸용 최대 너비 */
            height: 100%;
            max-height: 800px;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* UI 오버레이 설정 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.85);
            z-index: 10;
            text-align: center;
        }

        h1 {
            color: #0ff;
            text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
            font-size: 24px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        p {
            font-size: 10px;
            line-height: 1.8;
            color: #ccc;
            margin-bottom: 30px;
        }

        /* 한수원 로고 자리 */
        .logo-placeholder {
            width: 150px;
            height: 60px;
            border: 2px dashed #0ff;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            color: #0ff;
            font-size: 10px;
            background-color: rgba(0, 255, 255, 0.1);
        }

        button {
            background-color: transparent;
            color: #ff00ff;
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            border: 2px solid #ff00ff;
            padding: 15px 20px;
            cursor: pointer;
            text-shadow: 0 0 5px #ff00ff;
            box-shadow: 0 0 10px #ff00ff inset, 0 0 10px #ff00ff;
            transition: 0.2s;
        }

        button:hover {
            background-color: #ff00ff;
            color: #000;
        }

        #ui-layer {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #fff;
            z-index: 5;
            pointer-events: none;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- 게임 캔버스 -->
    <canvas id="gameCanvas"></canvas>

    <!-- 상단 점수/목숨 UI -->
    <div id="ui-layer">
        <div id="scoreDisplay">SCORE: 0</div>
        <div id="lifeDisplay">LIFE: 3</div>
    </div>

    <!-- 시작 화면 -->
    <div id="startScreen" class="overlay">
        <!-- 로고 이미지 교체 안내 (이미지가 있다면 아래 div를 img 태그로 변경하세요) -->
        <!-- <img src="khnp_logo.png" alt="한수원 로고" style="max-width: 150px; margin-bottom: 20px;"> -->
        <div class="logo-placeholder">KHNP 로고<br>삽입 공간</div>
        
        <h1>KHNP<br>SPACE DEFENDER</h1>
        <p>
            [PC 조작]<br>
            이동: ← → 화살표<br>
            발사: Spacebar 또는 터치<br><br>
            [모바일 조작]<br>
            이동: 화면 하단 터치 & 드래그<br>
            발사: 화면 터치
        </p>
        <button id="startBtn">GAME START</button>
    </div>

    <!-- 게임 오버 화면 -->
    <div id="gameOverScreen" class="overlay hidden">
        <h1 style="color: #ff0000; text-shadow: 0 0 10px #f00;">GAME OVER</h1>
        <p id="finalScore" style="color: #fff; font-size: 16px;">SCORE: 0</p>
        <button id="restartBtn">다시 하기</button>
    </div>
</div>

<script>
    /**
     * 오디오 컨텍스트 (8비트 레트로 효과음 생성기)
     * 신입 직원분들을 위한 설명: 외부 mp3 파일 없이, 브라우저의 소리 합성 기능을 이용해 '삐융', '쾅' 소리를 만듭니다.
     */
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new AudioContext();
        }
    }

    // 총알 발사음
    function playShootSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'square'; // 레트로 느낌의 사각파
        osc.frequency.setValueAtTime(880, audioCtx.currentTime); // 높은 음
        osc.frequency.exponentialRampToValueAtTime(110, audioCtx.currentTime + 0.1); // 음이 빠르게 떨어짐
        
        gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
    }

    // 폭발음
    function playExplosionSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    /**
     * 게임 엔진 설정
     */
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const startScreen = document.getElementById('startScreen');
    const gameOverScreen = document.getElementById('gameOverScreen');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const lifeDisplay = document.getElementById('lifeDisplay');
    const finalScoreDisplay = document.getElementById('finalScore');

    // 캔버스 크기를 컨테이너에 맞춤
    function resizeCanvas() {
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // 게임 상태 변수
    let animationId;
    let isPlaying = false;
    let score = 0;
    let lives = 3;
    let frameCount = 0;

    // 객체 배열
    let bullets = [];
    let enemies = [];
    let particles = []; // 폭발 파티클
    let stars = []; // 배경 별

    // 키보드 입력 상태
    const keys = {
        ArrowLeft: false,
        ArrowRight: false,
        Space: false
    };

    /**
     * 플레이어(우주선) 객체
     */
    const player = {
        w: 50,
        h: 40,
        x: canvas.width / 2 - 25,
        y: canvas.height - 60,
        speed: 5,
        color: '#00ffff', // 네온 시안
        draw() {
            // 우주선 몸체 그리기 (도트 느낌의 단순한 형태)
            ctx.fillStyle = this.color;
            // 가운데 뾰족한 부분
            ctx.fillRect(this.x + this.w/2 - 5, this.y, 10, this.h);
            // 날개
            ctx.fillRect(this.x, this.y + 20, this.w, 10);
            ctx.fillRect(this.x, this.y + 15, 10, 20);
            ctx.fillRect(this.x + this.w - 10, this.y + 15, 10, 20);

            // 우주선 위에 KHNP 각인
            ctx.fillStyle = '#000';
            ctx.font = '8px "Press Start 2P"';
            ctx.textAlign = 'center';
            ctx.fillText('KHNP', this.x + this.w/2, this.y + 28);
        },
        update() {
            // 키보드 이동
            if (keys.ArrowLeft && this.x > 0) {
                this.x -= this.speed;
            }
            if (keys.ArrowRight && this.x < canvas.width - this.w) {
                this.x += this.speed;
            }
        }
    };

    /**
     * 배경 별빛 생성 (레트로 우주 이동 효과)
     */
    function initStars() {
        stars = [];
        for (let i = 0; i < 50; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2 + 1,
                speed: Math.random() * 2 + 1
            });
        }
    }

    function drawStars() {
        ctx.fillStyle = '#ffffff';
        stars.forEach(star => {
            ctx.fillRect(star.x, star.y, star.size, star.size);
            star.y += star.speed;
            if (star.y > canvas.height) {
                star.y = 0;
                star.x = Math.random() * canvas.width;
            }
        });
    }

    /**
     * 게임 로직 함수들
     */
    function spawnEnemy() {
        const size = 30;
        const x = Math.random() * (canvas.width - size);
        // 난이도에 따라 적의 하강 속도를 조금씩 다르게 적용
        const speed = 1.5 + Math.random() * 2 + (score / 1000); 
        const colors = ['#ff00ff', '#ffff00', '#ff0000']; // 핑크, 노랑, 빨강
        const color = colors[Math.floor(Math.random() * colors.length)];
        
        enemies.push({ x, y: -size, w: size, h: size, speed, color });
    }

    function fireBullet() {
        bullets.push({
            x: player.x + player.w / 2 - 2,
            y: player.y,
            w: 4,
            h: 15,
            speed: 10,
            color: '#ffff00'
        });
        playShootSound();
    }

    // 간단한 사각형 충돌 검사 알고리즘 (AABB)
    function checkCollision(rect1, rect2) {
        return (
            rect1.x < rect2.x + rect2.w &&
            rect1.x + rect1.w > rect2.x &&
            rect1.y < rect2.y + rect2.h &&
            rect1.y + rect1.h > rect2.y
        );
    }

    // 폭발 효과 생성
    function createExplosion(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push({
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 5,
                vy: (Math.random() - 0.5) * 5,
                life: 30,
                color: color
            });
        }
    }

    function handleGameOver() {
        isPlaying = false;
        cancelAnimationFrame(animationId);
        finalScoreDisplay.textContent = `SCORE: ${score}`;
        gameOverScreen.classList.remove('hidden');
    }

    /**
     * 메인 게임 루프 (핵심 엔진)
     */
    function update() {
        if (!isPlaying) return;

        // 화면 지우기
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 배경 별 그리기
        drawStars();

        // 플레이어 업데이트 및 그리기
        player.update();
        player.draw();

        // 총알 업데이트
        for (let i = bullets.length - 1; i >= 0; i--) {
            let b = bullets[i];
            b.y -= b.speed;
            ctx.fillStyle = b.color;
            ctx.fillRect(b.x, b.y, b.w, b.h);

            // 화면 밖으로 나가면 제거
            if (b.y < 0) {
                bullets.splice(i, 1);
            }
        }

        // 적 스폰 (점수가 높아질수록 자주 생성)
        let spawnRate = Math.max(20, 60 - Math.floor(score / 100));
        if (frameCount % spawnRate === 0) {
            spawnEnemy();
        }

        // 적 업데이트 및 충돌 처리
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            e.y += e.speed;
            
            // 적 그리기 (UFO 형태)
            ctx.fillStyle = e.color;
            ctx.fillRect(e.x + 5, e.y, e.w - 10, e.h / 2); // 윗 뚜껑
            ctx.fillRect(e.x, e.y + e.h / 2, e.w, e.h / 2); // 아랫 몸통
            
            // 1. 적과 총알의 충돌 검사
            for (let j = bullets.length - 1; j >= 0; j--) {
                let b = bullets[j];
                if (checkCollision(e, b)) {
                    createExplosion(e.x + e.w/2, e.y + e.h/2, e.color);
                    playExplosionSound();
                    enemies.splice(i, 1);
                    bullets.splice(j, 1);
                    score += 100;
                    scoreDisplay.textContent = `SCORE: ${score}`;
                    break; // 해당 적이 사라졌으므로 총알 반복문 탈출
                }
            }

            // 적이 배열에서 삭제되지 않았다면 플레이어/바닥 충돌 검사 진행
            if (enemies[i]) {
                // 2. 적이 플레이어와 부딪히거나 바닥에 닿았을 때
                if (checkCollision(e, player) || e.y + e.h > canvas.height) {
                    createExplosion(player.x + player.w/2, player.y + player.h/2, '#00ffff');
                    playExplosionSound();
                    enemies.splice(i, 1);
                    lives -= 1;
                    lifeDisplay.textContent = `LIFE: ${lives}`;
                    
                    if (lives <= 0) {
                        handleGameOver();
                        return; // 루프 즉시 종료
                    }
                }
            }
        }

        // 폭발 파티클 업데이트
        for (let i = particles.length - 1; i >= 0; i--) {
            let p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            p.life -= 1;
            ctx.fillStyle = p.color;
            ctx.globalAlpha = p.life / 30; // 서서히 투명해짐
            ctx.fillRect(p.x, p.y, 4, 4);
            ctx.globalAlpha = 1.0;

            if (p.life <= 0) {
                particles.splice(i, 1);
            }
        }

        frameCount++;
        animationId = requestAnimationFrame(update);
    }

    /**
     * 입력 처리 (이벤트 리스너)
     */
    // 키보드 조작
    window.addEventListener('keydown', (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
        if (e.code === 'Space' && isPlaying) {
            fireBullet();
        }
    });

    window.addEventListener('keyup', (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
    });

    // 모바일 터치 조작 (드래그로 이동, 탭으로 발사)
    let touchStartX = 0;
    let playerStartX = 0;

    canvas.addEventListener('touchstart', (e) => {
        if (!isPlaying) return;
        e.preventDefault(); // 스크롤 방지
        const touch = e.touches[0];
        touchStartX = touch.clientX;
        playerStartX = player.x;
        
        // 화면을 터치할 때마다 총알도 발사
        fireBullet();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        if (!isPlaying) return;
        e.preventDefault();
        const touch = e.touches[0];
        const dx = touch.clientX - touchStartX;
        
        // 이동 거리만큼 플레이어 이동 (캔버스 범위 내 제한)
        let newX = playerStartX + dx;
        if (newX < 0) newX = 0;
        if (newX > canvas.width - player.w) newX = canvas.width - player.w;
        player.x = newX;
    }, { passive: false });

    /**
     * 게임 시작 및 초기화
     */
    function startGame() {
        initAudio(); // 사용자 인터랙션 발생 시 오디오 권한 획득
        
        // 변수 초기화
        score = 0;
        lives = 3;
        frameCount = 0;
        bullets = [];
        enemies = [];
        particles = [];
        player.x = canvas.width / 2 - player.w / 2;
        player.y = canvas.height - 60;
        
        // UI 업데이트
        scoreDisplay.textContent = `SCORE: ${score}`;
        lifeDisplay.textContent = `LIFE: ${lives}`;
        
        startScreen.classList.add('hidden');
        gameOverScreen.classList.add('hidden');
        
        initStars();
        isPlaying = true;
        update(); // 게임 루프 시작
    }

    // 버튼 이벤트
    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);

</script>

</body>
</html>
